<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Blue top band -->
  <rect width="600" height="100" fill="#032EA1"/>
  <!-- Red middle band (double width) -->
  <rect y="100" width="600" height="200" fill="#E00025"/>
  <!-- Blue bottom band -->
  <rect y="300" width="600" height="100" fill="#032EA1"/>
  <!-- Angkor Wat silhouette - centered on red band -->
  <g fill="#fff" transform="translate(300,200)">
    <!-- Central tower -->
    <rect x="-12" y="-80" width="24" height="80" rx="2"/>
    <rect x="-16" y="-85" width="32" height="8" rx="1"/>
    <rect x="-20" y="-95" width="40" height="12" rx="1"/>
    <rect x="-24" y="-108" width="48" height="15" rx="1"/>
    <rect x="-26" y="-120" width="52" height="14" rx="2"/>
    <ellipse cx="0" cy="-128" rx="6" ry="8" fill="#fff"/>
    <!-- Left tower -->
    <rect x="-90" y="-55" width="18" height="55" rx="2"/>
    <rect x="-94" y="-62" width="26" height="10" rx="1"/>
    <rect x="-98" y="-72" width="34" height="12" rx="1"/>
    <rect x="-100" y="-82" width="38" height="12" rx="2"/>
    <ellipse cx="-81" cy="-90" rx="5" ry="6" fill="#fff"/>
    <!-- Right tower -->
    <rect x="72" y="-55" width="18" height="55" rx="2"/>
    <rect x="68" y="-62" width="26" height="10" rx="1"/>
    <rect x="64" y="-72" width="34" height="12" rx="1"/>
    <rect x="62" y="-82" width="38" height="12" rx="2"/>
    <ellipse cx="81" cy="-90" rx="5" ry="6" fill="#fff"/>
    <!-- Base platform -->
    <rect x="-110" y="-30" width="220" height="30" rx="2"/>
    <rect x="-130" y="-20" width="260" height="20" rx="2"/>
    <!-- Side walls connecting towers -->
    <rect x="-70" y="-45" width="140" height="45"/>
    <rect x="-74" y="-50" width="148" height="8" rx="1"/>
    <!-- Windows/doors on base -->
    <rect x="-6" y="-10" width="12" height="10" fill="#E00025"/>
    <rect x="-22" y="-10" width="12" height="10" fill="#E00025"/>
    <rect x="10" y="-10" width="12" height="10" fill="#E00025"/>
    <!-- Small decorative spires on side walls -->
    <rect x="-40" y="-52" width="6" height="10" fill="#fff"/>
    <rect x="34" y="-52" width="6" height="10" fill="#fff"/>
    <ellipse cx="-37" cy="-55" rx="3" ry="3" fill="#fff"/>
    <ellipse cx="37" cy="-55" rx="3" ry="3" fill="#fff"/>
  </g>
</svg>